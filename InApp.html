<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidio iOS App Clone & Editor</title>
    <style>
        /* --- GLOBAL & LAYOUT STYLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #0b0b0c;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* --- EDITOR STYLES (TOP SECTION) --- */
        .editor-panel {
            width: 100%;
            max-width: 412px;
            background: #1c1c1e;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            border: 1px solid #2c2c2e;
        }

        .editor-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #f31c4e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #aeaeae;
            margin-bottom: 6px;
        }

        input[type="text"] {
            width: 100%;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            border-radius: 8px;
            padding: 10px 12px;
            color: #fff;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #f31c4e;
        }

        /* --- MOBILE DEVICE SIMULATION FRAME --- */
        .phone-viewport {
            width: 390px;
            height: 844px;
            background-color: #141414;
            border-radius: 0px; /* HP KOTAK SEMPURNA SESUAI SCREENSHOT */
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 0 12px #2c2c2e, 0 20px 60px rgba(0,0,0,0.8);
            border: 4px solid #000;
        }

        /* Dynamic iOS Notch Space Isolation */
        .phone-viewport::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 30px;
            background: #000;
            border-bottom-left-radius: 0px; /* Notch kotak sempurna */
            border-bottom-right-radius: 0px; /* Notch kotak sempurna */
            z-index: 10000;
            pointer-events: none;
        }

        /* --- IOS STATUS BAR --- */
        .status-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 47px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 28px 0 32px;
            z-index: 999;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            pointer-events: none;
        }

        .status-left {
            display: flex;
            align-items: center;
        }

        .status-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-icon {
            width: 17px;
            height: 11px;
            fill: currentColor;
        }

        .status-battery {
            width: 25px;
            height: 12px;
        }

        /* --- IN-APP BANNER POPUP OVERLAY STYLES --- */
        .popup-backdrop-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 1;
            transition: opacity 0.25s ease;
        }

        .popup-backdrop-overlay.hidden {
            display: none;
            opacity: 0;
            pointer-events: none;
        }

        /* KONTROL UTAMA: Mengatur Ukuran Dasar PopUp */
        .banner-wrapper {
            width: 300px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: center center;
            transition: transform 0.2s ease-out;
        }

        .close-button {
            position: absolute;
            top: -17px;
            right: -20px;
            background: none;
            border: none;
            padding: 0;
            z-index: 9999;
            cursor: pointer;
            width: 36px;
            height: 36px;
            filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.4));
        }

        .close {
            display: block;
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        .carousel {
            width: 100%;
            overflow: hidden;
        }

        .carousel-inner {
            display: flex;
        }

        .carousel-item {
            min-width: 100%;
        }

        .promo-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 20px; /* Gambar InApp tetap melengkung */
        }

        .promo-button {
            background: linear-gradient(135deg, #f31c4e, #ff0000);
            display: inline-block;
            width: auto;
            min-width: 170px;
            padding: 10px;
            color: #fff;
            text-decoration: none;
            font-weight: 750;
            font-size: clamp(15px, 5vw, 19px);
            border-radius: 12px;
            margin-top: -20px;
            position: relative;
            z-index: 20;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(255, 0, 54, 0.5);
            text-align: center;
        }

        .promo-button::before {
            content: "";
            position: absolute;
            top: 0;
            left: -75%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                120deg,
                rgba(255, 255, 255, 0.2),
                rgba(255, 255, 255, 0.6),
                rgba(255, 255, 255, 0.2)
            );
            transform: skewX(-25deg);
            animation: shineLoop 1.7s infinite;
        }

        @keyframes shineLoop {
            0% {
                left: -75%;
            }
            100% {
                left: 125%;
            }
        }

        .promo-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgb(255, 0, 55);
        }
    </style>
</head>
<body>

    <div class="editor-panel">
        <div class="editor-title">Preview InApp</div>
        <div class="form-group">
            <label for="inputHeroUrl">Homepage URL</label>
            <input type="text" id="inputHeroUrl" value="https://thumbor.prod.vidiocdn.com/XU3KP7neB65TmDK_yG1NuzyX9vM=/filters:quality(90)/vidio-pns-prod-gandiwaimage/uploads/image/image_file/23512/Desain_tanpa_judul__4_.png">
        </div>
        <div class="form-group">
            <label for="inputPopupKv">Popup KV URL</label>
            <input type="text" id="inputPopupKv" value="https://thumbor.prod.vidiocdn.com/Z746NeUO3TEzLQP_tVvuBVI19u4=/filters:quality(90)/vidio-pns-prod-gandiwaimage/uploads/image/image_file/23590/IGF_Volleyball_Friendly_Match_MATCH.jpg">
        </div>
        <div class="form-group">
            <label for="inputCtaText">CTA Text</label>
            <input type="text" id="inputCtaText" value="Langganan Sekarang">
        </div>
        <div class="form-group">
            <label for="inputTime">Time (Status Bar)</label>
            <input type="text" id="inputTime" value="1.41">
        </div>
    </div>
    

    <div class="phone-viewport" id="phoneViewport">
        
        <div class="status-bar">
            <div class="status-left" id="statusBarTime">1.41</div>
            <div class="status-right">
                <svg class="status-icon" viewBox="0 0 18 12">
                    <path d="M1 10h2v2H1zm4-3h2v5H5zm4-3h2v8H9zm4-4h2v12h-2z"/>
                </svg>
                <svg class="status-icon" viewBox="0 0 16 12">
                    <path d="M8 2c2.5 0 4.7 1 6.4 2.6l1.4-1.4C13.7 1.3 11 0 8 0S2.3 1.3.2 3.2l1.4 1.4C3.3 3 5.5 2 8 2zm0 3.5c1.5 0 2.9.6 3.9 1.6l1.4-1.4C11.7 4.1 9.9 3.5 8 3.5s-3.7.6-5.3 2.2l1.4 1.4c1-1 2.4-1.6 3.9-1.6zm0 3.5c.6 0 1.1.2 1.5.6l1.4-1.4C10.1 7.4 9.1 7 8 7s-2.1.4-2.9 1.2l1.4 1.4c.4-.4.9-.6 1.5-.6zm0 2c.3 0 .5-.2.5-.5s-.2-.5-.5-.5-.5.2-.5.5.2.5.5.5z"/>
                </svg>
                <svg class="status-battery" viewBox="0 0 27 13">
                    <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" fill="none" stroke="#ffffff" stroke-opacity="0.9"/>
                    <rect x="2.5" y="2.5" width="19" height="8" rx="1.5" fill="#ffffff"/>
                    <path d="M25 4.5v4c0 .8-.5 1-1 1v-6c.5 0 1 .2 1 1z" fill="#ffffff"/>
                </svg>
            </div>
        </div>

        <img
            id="heroImageElement"
            src="https://thumbor.prod.vidiocdn.com/XU3KP7neB65TmDK_yG1NuzyX9vM=/filters:quality(90)/vidio-pns-prod-gandiwaimage/uploads/image/image_file/23512/Desain_tanpa_judul__4_.png"
            alt="Homepage Screenshot"
            style="
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                object-fit: cover;
                object-position: top;
                display: block;
                z-index: 1;
            "
        >

        <!-- IN-APP POPUP OVERLAY PERBAIKAN -->
        <div class="popup-backdrop-overlay" id="popupOverlay">
            <div class="banner-wrapper" id="bannerWrapper">
                <button class="close-button" id="closePopupButton" data-dismiss="true" aria-label="Close">
                    <img
                        class="close"
                        src="https://thumbor.prod.vidiocdn.com/-TZJl0nIYqCx4D3ffuR5Jint3eA=/filters:quality(90)/vidio-pns-prod-gandiwaimage/uploads/image/image_file/22924/cancel__2_.png"
                        alt="Close"
                    />
                </button>
                
                <div class="carousel">
                    <div class="carousel-inner">
                        <div class="carousel-item">
                            <a href="#">
                                <img
                                    id="popupKvImage"
                                    src="https://thumbor.prod.vidiocdn.com/Z746NeUO3TEzLQP_tVvuBVI19u4=/filters:quality(90)/vidio-pns-prod-gandiwaimage/uploads/image/image_file/23590/IGF_Volleyball_Friendly_Match_MATCH.jpg"
                                    alt="Promo Image 1"
                                    class="promo-image"
                                />
                            </a>
                        </div>
                    </div>
                </div>

                <a class="promo-button" id="popupCtaButton" href="#">
                    Langganan Sekarang
                </a>
            </div>
        </div>

    </div>

    <script>
        // DOM Element Cache Selectors
        const inputHeroUrl = document.getElementById('inputHeroUrl');
        const inputPopupKv = document.getElementById('inputPopupKv');
        const inputCtaText = document.getElementById('inputCtaText');
        const inputTime = document.getElementById('inputTime');

        const heroImageElement = document.getElementById('heroImageElement');
        const statusBarTime = document.getElementById('statusBarTime');
        const popupKvImage = document.getElementById('popupKvImage');
        const popupCtaButton = document.getElementById('popupCtaButton');
        const popupOverlay = document.getElementById('popupOverlay');
        const closePopupButton = document.getElementById('closePopupButton');
        const phoneViewport = document.getElementById('phoneViewport');
        const bannerWrapper = document.getElementById('bannerWrapper');

        // Automatic Scaling Logic
        function scaleBanner() {
            const vw = phoneViewport.clientWidth;
            const vh = phoneViewport.clientHeight;

            const baseWidth = 300;
            const baseHeight = 420;

            const availableWidth = vw - 40; 
            const availableHeight = vh - 60;

            const scaleX = availableWidth / baseWidth;
            const scaleY = availableHeight / baseHeight;

            let scale = Math.min(scaleX, scaleY);
            scale = Math.min(Math.max(scale, 0.6), 1.25);

            bannerWrapper.style.transform = `scale(${scale})`;
        }

        // Real-time Sync Function
        function synchronizeRealtimePreview() {
            heroImageElement.src = inputHeroUrl.value;
            popupKvImage.src = inputPopupKv.value;
            popupCtaButton.textContent = inputCtaText.value;
            statusBarTime.textContent = inputTime.value;
        }

        // Event Listeners
        inputHeroUrl.addEventListener('input', synchronizeRealtimePreview);
        inputCtaText.addEventListener('input', () => {
            synchronizeRealtimePreview();
            popupOverlay.classList.remove('hidden');
        });
        inputPopupKv.addEventListener('input', () => {
            synchronizeRealtimePreview();
            popupOverlay.classList.remove('hidden');
        });
        inputTime.addEventListener('input', synchronizeRealtimePreview);

        closePopupButton.addEventListener('click', () => {
            popupOverlay.classList.add('hidden');
        });

        // Init
        synchronizeRealtimePreview();
        scaleBanner();
        window.addEventListener('resize', scaleBanner);
    </script>
</body>
</html>
