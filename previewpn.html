<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidio Push Notification Preview Mockup</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #f0f2f5;
            padding: 40px 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #ffffff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }
        h2 {
            margin-top: 0;
            color: #333;
            font-size: 20px;
            border-bottom: 2px solid #eaeaea;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #444;
            font-size: 14px;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, textarea:focus {
            border-color: #e21c24;
        }
        textarea {
            resize: vertical;
            height: 80px;
        }
        
        /* Notification Styling mimicking iOS/Android Rich Push */
        .notification-preview {
            width: 100%;
            max-width: 540px;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .notif-header {
            display: flex;
            padding: 14px 16px;
            align-items: center;
            position: relative;
        }
        .notif-logo-wrapper {
            margin-right: 12px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .notif-logo {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
            display: block;
        }
        .notif-content-text {
            flex-grow: 1;
            padding-right: 45px; /* space for time */
        }
        .notif-title {
            font-size: 16px;
            font-weight: 700;
            color: #111111;
            margin: 0 0 3px 0;
            line-height: 1.3;
        }
        .notif-body {
            font-size: 16px;
            font-weight: 400;
            color: #222222;
            margin: 0;
            line-height: 1.4;
            word-break: break-word;
        }
        .notif-time {
            position: absolute;
            top: 14px;
            right: 18px;
            font-size: 12px;
            color: #8e8e93;
            font-weight: 400;
        }
        .notif-image-wrapper {
            width: 100%;
            overflow: hidden;
            display: block;
            line-height: 0;
        }
        .notif-image {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Control Panel / Input Form -->
    <div class="container">
        <h2>Editor Preview Push Notification Vidio</h2>
        
        <div class="form-group">
            <label for="input-logo">URL Logo Vidio (Kiri Atas):</label>
            <input type="text" id="input-logo" value="https://play-lh.googleusercontent.com/SfWzLXzi9uSRLuy_tnmOrf3h7GFB_zQUcFU6S18l3UzyW1WoF9WqVa-tibyK8_AfXgvPLYMzbUQsRqaYBqCyVQ=w480-h960-rw" placeholder="Masukkan URL Logo...">
        </div>
        
        <div class="form-group">
            <label for="input-title">Title Copywriting:</label>
            <input type="text" id="input-title" value="🔴 LIVE: INDONESIA vs MALAYSIA" placeholder="Masukkan judul/title...">
        </div>

        <div class="form-group">
            <label for="input-time">Keterangan Waktu (Kanan Atas):</label>
            <input type="text" id="input-time" value="now" placeholder="Contoh: now, 1m ago, 15.44">
        </div>
        
        <div class="form-group">
            <label for="input-body">Body Copywriting:</label>
            <textarea id="input-body" placeholder="Masukkan isi pesan/body...">Skuad baru, rivalitas lama 🔥 Garuda Muda siap sajikan laga seru malam ini! Tonton yuk 👇</textarea>
        </div>
        
        <div class="form-group">
            <label for="input-image">URL Gambar Besar (Big Image Template):</label>
            <input type="text" id="input-image" value="https://thumbor.prod.vidiocdn.com/aoSMOLpOw-gTdqBPcz8opUf6l_U=/filters:quality(90)/vidio-pns-prod-gandiwaimage/uploads/image/image_file/23454/330_SG_BA_APAC_1920x1080.jpg" placeholder="Masukkan URL Gambar Banner...">
        </div>
    </div>

    <!-- Live Preview Box -->
    <div class="notification-preview">
        <!-- Header Part -->
        <div class="notif-header">
            <div class="notif-logo-wrapper">
                <img id="preview-logo" class="notif-logo" src="" alt="Logo">
            </div>
            <div class="notif-content-text">
                <p id="preview-title" class="notif-title"></p>
                <p id="preview-body" class="notif-body"></p>
            </div>
            <div id="preview-time" class="notif-time"></div>
        </div>
        
        <!-- Big Image Part -->
        <div class="notif-image-wrapper">
            <img id="preview-image" class="notif-image" src="" alt="Banner Preview">
        </div>
    </div>

    <script>
        // Get elements
        const inputLogo = document.getElementById('input-logo');
        const inputTitle = document.getElementById('input-title');
        const inputTime = document.getElementById('input-time');
        const inputBody = document.getElementById('input-body');
        const inputImage = document.getElementById('input-image');

        const previewLogo = document.getElementById('preview-logo');
        const previewTitle = document.getElementById('preview-title');
        const previewTime = document.getElementById('preview-time');
        const previewBody = document.getElementById('preview-body');
        const previewImage = document.getElementById('preview-image');

        // Function to update preview
        function updatePreview() {
            previewLogo.src = inputLogo.value || 'https://via.placeholder.com/38';
            previewTitle.innerText = inputTitle.value;
            previewTime.innerText = inputTime.value;
            previewBody.innerText = inputBody.value;
            previewImage.src = inputImage.value || 'https://via.placeholder.com/540x300?text=Placeholder+Gambar+Vidio';
        }

        // Add event listeners for real-time update
        inputLogo.addEventListener('input', updatePreview);
        inputTitle.addEventListener('input', updatePreview);
        inputTime.addEventListener('input', updatePreview);
        inputBody.addEventListener('input', updatePreview);
        inputImage.addEventListener('input', updatePreview);

        // Initial render
        updatePreview();
    </script>
</body>
</html>
